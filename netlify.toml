[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/checkout-p1"
  to = "/.netlify/functions/get-checkout?id=p1"
  status = 200

[[redirects]]
  from = "/checkout-p2"
  to = "/.netlify/functions/get-checkout?id=p2"
  status = 200

[[redirects]]
  from = "/checkout-p3"
  to = "/.netlify/functions/get-checkout?id=p3"
  status = 200

[[redirects]]
  from = "/telegram"
  to = "/.netlify/functions/get-checkout?id=tg"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:;"
    Cross-Origin-Resource-Policy = "same-site"
